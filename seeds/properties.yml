version: 2

seeds:
  - name: "scooters"
    description: "Scooter models info and statistics"
    config:
      delimiter: ","
  - name: "event_types"
    description: "Dictionary of events"
    config:
      delimiter: ","
  - name: "age_groups"
    description: "Age groups to split users for analysis"
    config:
      delimiter: ","
    columns:
      - name: "group"
        description: "Name of the age group"
        data_tests: [ "unique_not_null" ]
      - name: "age_start"
        description: "left threshold of the age group"
        data_tests: [ "unique_not_null" ]
      - name: "age_end"
        description: "right threshold of the age group"
        data_tests: [ "unique_not_null" ]
        
