version: 2

sources:
  - name: "scooters_raw"
    description: "Raw data provided by scooters service"
    loader: "https://t.me/inzhenerka_dbt_bot"
    tables:
      - name: "trips"
        description: "Scooter trips"
        loaded_at_field: "finished_at"
        freshness:
          warn_after:
            count: 1
            period: "day"
          error_after:
            count: 3650
            period: "day"
        columns:
          - name: "user_id"
            description: "User identifier"
            data_tests:
              - not_null
              - relationships:
                  arguments:
                    name: "every_trip_has_user"
                    to: "source('scooters_raw', 'users')"
                    field: "id"

      - name: "users"
        description: "Users of scooter service"
        columns:
          - name: "sex"
            description: "User gender"
            data_tests:
              - accepted_values:
                  arguments:
                    values: ['M', 'F']
              - not_null:
                  config:
                    severity: 'warn'

      - name: "events"
        description: "Events table with duplicates"
      

models:
  - name: trips_prep
    description: "Preprocessed scooter trips data with calculated metrics and cleaned pricing"
    config:
      materialized: view
    data_tests:
      - row_count_equal:
          compare_model: "source('scooters_raw', 'trips')" 
    columns:
      - name: id
        description: "Unique identifier for the trip"
      - name: user_id
        description: "ID of the user who took the trip"
      - name: scooter_hw_id
        description: "Hardware ID of the scooter used"
      - name: started_at
        description: "Timestamp when the trip started"
      - name: finished_at
        description: "Timestamp when the trip ended"
      - name: start_lat
        description: "Latitude of trip start location"
      - name: start_lon
        description: "Longitude of trip start location"
      - name: finish_lat
        description: "Latitude of trip end location"
      - name: finish_lon
        description: "Longitude of trip end location"
      - name: distance_m
        description: "Trip distance in meters"
      - name: price_rub
        description: "Trip price in Russian rubles"
      - name: duration_s
        description: "Trip duration in seconds"
      - name: is_free
        description: "Boolean indicating if the trip was free (price = 0 but duration > 0)"
      - name: date
        description: "Date when the trip started"
  - name: trips_stat
    description: "Trip stats model"
    config:
      materialized: table
    columns:
      - name: trips
        description: "count trips"
      - name: users
        description: "count distinct users"
      - name: avg_duration_m
        description: "avg duration_min"
      - name: revenue_rub
        description: "sum over price_rub field"
      - name: free_trips_pct
        description: "casing is_free field"
      - name: sum_distance_km
        description: "sum of distance_m divided by 1000"
  - name: trips_stat_daily
    description: "daily trip statistics"
    config:
      materialized: table
      indexes: [
                {'columns': ['date']} #OR SIMPLY - columns: ["date"] AFTER INDEXES FROM THE NEW LINE
      ]
  - name: trips_age_daily
    description: "daily trips stats by user age"
    data_tests:
      - unique:
          arguments:
            column_name: "date::text || age::text"
      - unique_key:
          arguments:
            columns: ['date','age']
          
  - name: trips_age_daily_stat
    description: "aggregation of daily trips stats by user age"
  - name: trips_geom
    description: "new model with geo data"
    config:
      materialized: view
  - name: parking_start_stat
    description: "new model hexagons in the map detecting the start location of the trip "
    config:
      materialized: table
  - name: parking_finish_stat
    description: "new model hexagons in the map detecting the finish location of the trip "
    config:
      materialized: table
  - name: trips_users
    description: "trips_prep join with source table trips"
    config:
      materialized: incremental
      on_schema_change: 'append_new_columns'
      # +post-hook: [analyze dbt.trips_users vacuum dbt.trips_users]
      post-hook:
        - "analyze dbt.trips_users"
        - sql: "vacuum dbt.trips_users"
          transaction: false
  - name: events_clean
    description: "Events table from src database without duplicates"
    config:
      materialized: incremental
      # on_schema_change: 'append_new_columns'
      unique_key: ['user_id','timestamp','type_id']
      strategy: merge
    columns:
      - name: "user_id"
        description: "User identifier"
        data_tests:
          - not_null
  - name: trips_concurrency
    description: "model counting the number of concurrent trips (active at the same time)"
    config:
      materialized: incremental
      on_schema_change: 'append_new_columns'
  - name: companies
    description: "a new model with scooters companies statistics based on info from seed"
  - name: companies_trips
    description: "Trip satistics by company"
    columns:
      - name: "company"
        description: "Scooters manufacturing name"
        data_tests:
          - unique
  - name: events_full
    description: "Enriched events_clean with type_id from seed file called event_types"
    config:
      materialized: view
      meta:
        unique_key: ["user_id","timestamp","type_id"]
        testing:
          days_max: 60
    data_tests: ["unique_key_meta"]
  - name: "events_stat"
    description: "Overall user events statistics"
  - name: trips_age_group
    description: "Statistics via age_group"
  - name: "events_prep"
    description: "User event prepared for following processing"
    config: 
      materialized: view
    columns:
      - name: date
        description: |
          Date of event derived from timestamp.
          Imitates Hive-styled partitioning of events by date.
          It is needed for efficient incremental processing by engines
          with partitioning support (i.e. Trino).
  - name: "events_clean_v2"
    description: "User events without duplicates"
    config:
      materialized: "incremental"
      incremental_strategy: merge
      unique_key: ["user_id","timestamp", "type_id"]
      meta:
        owner: "Roman Gerasimov"
        incrementality:
          start_date: "2023-06-01"
          days_max: 60
  - name: "sex_age_pivot"
    description: "Model with age aggregation via sex field using dbt_utils test-templates"
    columns:
      - name: "age"
        description: "numerical age of user"
        data_tests:
          - dbt_utils.not_constant
    data_tests:
      - unique_key:
          columns: ['age']
      - dbt_expectations.expect_table_column_count_to_equal:
          value: 3
  - name: "events_stream"
    description: "User events prepared for product analysis"
    config:
      materialized: "ephemeral"
  - name: "book_scooter_retention"
    description: >
      Model calculating retention with the help of dbt_product_analytics package
      tells how many people started search for scooter and finally booked it on or after
      1, 7, 14 days (or weeks, months, years), etc
    





